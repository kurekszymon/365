services:
  postgres:
    image: postgres:17-alpine
    container_name: pgsql-node
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: prisma
    ports:
      - "5433:5432"
    volumes:
      - pgsql_node_data:/var/lib/postgresql/data

volumes:
  pgsql_node_data:
