<section aria-label="Offboarding summary">
  <h3 class="section-title">Summary</h3>
  <div class="summary-stats" role="list">
    <div class="summary-stat summary-stat--pending" role="listitem">
      <span class="summary-stat__count">{{ pending() }}</span>
      <span class="summary-stat__label">Pending</span>
    </div>
    <div class="summary-stat summary-stat--returned" role="listitem">
      <span class="summary-stat__count">{{ returned() }}</span>
      <span class="summary-stat__label">Returned</span>
    </div>
    <div class="summary-stat summary-stat--issue" role="listitem">
      <span class="summary-stat__count">{{ issues() }}</span>
      <span class="summary-stat__label">Issues</span>
    </div>
  </div>
  <button
    type="button"
    class="btn btn--complete"
    [disabled]="!allActioned()"
    [attr.aria-disabled]="!allActioned()"
    (click)="complete.emit()"
  >
    Complete offboarding
  </button>
</section>
