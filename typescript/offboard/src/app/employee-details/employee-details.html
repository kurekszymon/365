<dialog #dialog aria-labelledby="dialog-title" (close)="close()">
  @if (employee(); as emp) {
    <header class="dialog-header">
      <div>
        <h2 id="dialog-title" class="dialog-header__name">{{ emp.name }}</h2>
        <p class="dialog-header__meta">{{ emp.department }} · Last day: {{ emp.last_day }}</p>
      </div>
      <button type="button" class="close-btn" aria-label="Close dialog" (click)="close()">X</button>
    </header>

    <div class="dialog-body">
      @if (offboardingDone()) {
        <app-offboarding-confirmation [employeeName]="emp.name" (closed)="close()" />
      } @else {
        <section aria-label="Equipment list">
          <h3 class="section-title">Equipment ({{ emp.equipment.length }} items)</h3>
          <ul class="equipment-list">
            @for (eq of emp.equipment; track eq.id) {
              <li app-equipment-item [eq]="eq"></li>
            }
          </ul>
        </section>

        <app-offboarding-summary
          [pending]="pending()"
          [returned]="returnedCount()"
          [issues]="issueCount()"
          [allActioned]="allActioned()"
          (complete)="completeOffboarding()"
        />
      }
    </div>
  } @else {
    <p class="loading">Loading employee data…</p>
  }
</dialog>
