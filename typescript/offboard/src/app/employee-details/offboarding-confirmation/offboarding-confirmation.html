<div class="confirmation" role="status" aria-live="polite">
  <div class="confirmation__icon" aria-hidden="true">✓</div>
  <h3 class="confirmation__title">Offboarding complete</h3>
  <p class="confirmation__desc">
    {{ employeeName() }} has been successfully offboarded and removed from the pending list.
  </p>
  <button type="button" class="btn" (click)="closed.emit()">Close</button>
</div>
