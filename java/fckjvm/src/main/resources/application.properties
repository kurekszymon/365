spring.application.name=fckjvm

# ── PostgreSQL ──────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/fckjvm
spring.datasource.username=postgres
spring.datasource.password=postgres

# ── JPA / Hibernate ────────────────────────────────────────
# "update" auto-applies schema changes on startup (dev only — use Flyway/Liquibase in prod)
spring.jpa.hibernate.ddl-auto=update
# show SQL in logs so you can see what Hibernate generates
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ── Redis ───────────────────────────────────────────────────
spring.data.redis.host=localhost
spring.data.redis.port=6379

# ── SpringDoc Swagger ───────────────────────────────────────
springdoc.swagger-ui.enabled=true

# ── Keycloak / OAuth2 Resource Server ──────────────────────
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8180/realms/fckjvm