<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Unified SQL Playground</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 2em;
        }

        textarea {
            width: 100%;
            height: 4em;
        }

        table {
            border-collapse: collapse;
            margin-top: 1em;
        }

        th,
        td {
            border: 1px solid #ccc;
            padding: 0.5em;
        }

        th {
            background: #f0f0f0;
        }

        .error {
            color: red;
        }

        .schema {
            font-size: 0.95em;
            margin-bottom: 1em;
        }
    </style>
</head>

<body>
    <h1>Unified SQL Playground</h1>
    <div class="schema" id="schema"></div>
    <form id="sqlForm">
        <label for="sqlInput">Enter a SELECT query (try views, joins, aggregates):</label><br>
        <textarea id="sqlInput">SELECT * FROM users</textarea><br>
        <button type="submit">Run Query</button>
    </form>
    <div id="result"></div>
    <script>
        async function fetchSchema() {
            const res = await fetch('sql-playground.php');
            const data = await res.json();
            let html = '<b>Database Schema & Views:</b><ul>';
            for (const [table, cols] of Object.entries(data.schema)) {
                if (cols === 'VIEW') {
                    html += `<li><b>${table}</b> (VIEW)</li>`;
                } else {
                    html += `<li><b>${table}</b> (` + cols.map(c => `${c.name}: ${c.type}`).join(', ') + ")</li>";
                }
            }
            html += '</ul>';
            document.getElementById('schema').innerHTML = html;
        }

        function renderTable(rows) {
            if (!rows.length) return '<i>No results.</i>';
            let html = '<table><tr>';
            for (const key of Object.keys(rows[0])) html += `<th>${key}</th>`;
            html += '</tr>';
            for (const row of rows) {
                html += '<tr>';
                for (const key of Object.keys(row)) html += `<td>${row[key]}</td>`;
                html += '</tr>';
            }
            html += '</table>';
            return html;
        }


        async function submitQuery() {
            const sql = document.getElementById('sqlInput').value;
            const t0 = performance.now();
            const res = await fetch('sql-playground.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ sql })
            });
            const t1 = performance.now(); // After network+backend
            const data = await res.json();
            const t2 = performance.now(); // After JSON parse
            if (data.error) {
                document.getElementById('result').innerHTML = `<div class="error">${data.error}</div>`;
            } else {
                const container = document.getElementById('result');
                // Measure parse time
                const parseTime = (t2 - t1) / 1000;

                // Prepare table HTML but don't insert yet
                const tableHtml = renderTable(data.result);

                // Build initial timing display with placeholders for render/total
                let timingHtml = '<div id="timings" style="margin-bottom:0.5em">';
                if (typeof data.timing_sql !== 'undefined') {
                    timingHtml += `<div><b>Backend SQL time:</b> ${data.timing_sql.toFixed(4)} s</div>`;
                }
                if (typeof data.timing_fetch !== 'undefined') {
                    timingHtml += `<div><b>Backend fetchAll time:</b> ${data.timing_fetch.toFixed(4)} s</div>`;
                }
                if (typeof data.timing_json !== 'undefined') {
                    timingHtml += `<div><b>Backend JSON encode time:</b> ${data.timing_json.toFixed(4)} s</div>`;
                }
                if (typeof data.timing_backend_total !== 'undefined') {
                    timingHtml += `<div><b>Backend total time:</b> ${data.timing_backend_total.toFixed(4)} s</div>`;
                }
                timingHtml += `<div><b>Network+Backend (fetch):</b> ${((t1 - t0) / 1000).toFixed(4)} s</div>`;
                timingHtml += `<div><b>JSON parse time (client):</b> ${parseTime.toFixed(4)} s</div>`;
                timingHtml += `<div id="frontend-render"><b>Frontend render (paint):</b> calculating...</div>`;
                timingHtml += `<div id="total-submit-paint"><b>Total (submit to paint):</b> calculating...</div>`;
                timingHtml += '</div>';

                // Insert timings immediately and a table placeholder
                container.innerHTML = timingHtml + '<div id="table-holder"><i>Rendering table...</i></div>';

                // Now render table into holder and measure paint
                const tableHolder = document.getElementById('table-holder');
                const renderStart = performance.now();
                tableHolder.innerHTML = tableHtml;
                // Wait for two rAFs to ensure the browser painted the content
                await new Promise(resolve => requestAnimationFrame(() => requestAnimationFrame(resolve)));
                const renderEnd = performance.now();
                const renderTime = (renderEnd - renderStart) / 1000;

                // Update timing fields in-place to avoid reflowing the large table twice
                const renderEl = document.getElementById('frontend-render');
                const totalEl = document.getElementById('total-submit-paint');
                if (renderEl) renderEl.innerHTML = `<b>Frontend render (paint):</b> ${renderTime.toFixed(4)} s`;
                if (totalEl) totalEl.innerHTML = `<b>Total (submit to paint):</b> ${((renderEnd - t0) / 1000).toFixed(4)} s`;
            }
        }

        document.getElementById('sqlForm').onsubmit = async (e) => {
            e.preventDefault();
            submitQuery();
        };

        document.getElementById('sqlInput').addEventListener('keydown', function (e) {
            if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
                e.preventDefault();
                submitQuery();
            }
        });

        fetchSchema();
    </script>
</body>

</html>
