<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>PHP Notes App</title>
  <style>
    body {
      font-family: sans-serif;
      margin: 2em;
    }

    #notes {
      margin-top: 1em;
    }

    .note {
      background: #f9f9f9;
      border: 1px solid #ddd;
      padding: 0.5em;
      margin-bottom: 0.5em;
    }
  </style>
</head>

<body>
  <h1>Note Taking App</h1>
  <form id="noteForm">
    <textarea id="noteInput" rows="3" cols="40" placeholder="Write a note..."></textarea><br>
    <button type="submit">Add Note</button>
  </form>
  <div id="notes"></div>
  <script>
    const notesDiv = document.getElementById('notes');
    const form = document.getElementById('noteForm');
    const input = document.getElementById('noteInput');
    const channel = new BroadcastChannel('notes_channel');

    function escapeHTML(str) {
      return str.replace(/[&<>"']/g, function(tag) {
        const chars = {
          '&': '&amp;',
          '<': '&lt;',
          '>': '&gt;',
          '"': '&quot;',
          '\'': '&#39;'
        };
        return chars[tag] || tag;
      });
    }

    function renderNotes(notes) {
      notesDiv.innerHTML = '';
      notes.forEach(note => {
        const div = document.createElement('div');
        div.className = 'note';
        div.textContent = note.content;
        notesDiv.appendChild(div);
      });
    }

    async function fetchNotes() {
      const res = await fetch('notes.php');
      const notes = await res.json();
      renderNotes(notes);
    }

    form.onsubmit = async (e) => {
      e.preventDefault();
      const content = input.value.trim();
      if (!content) return;
      await fetch('notes.php', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          content
        })
      });
      input.value = '';
      channel.postMessage('update');
      fetchNotes();
    };

    channel.onmessage = (e) => {
      if (e.data === 'update') fetchNotes();
    };

    window.addEventListener('storage', (e) => {
      if (e.key === 'notes_update') fetchNotes();
    });

    fetchNotes();
  </script>
</body>

</html>
